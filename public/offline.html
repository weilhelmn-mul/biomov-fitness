<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIOMOV - Sin conexión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #00D4FF 0%, #8B5CF6 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #00D4FF 0%, #8B5CF6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    p {
      color: #a0a0a0;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    .retry-btn {
      background: linear-gradient(135deg, #00D4FF 0%, #00B8E6 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }
    
    .tips {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .tips h3 {
      font-size: 14px;
      color: #00D4FF;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .tips ul {
      list-style: none;
      text-align: left;
    }
    
    .tips li {
      padding: 8px 0;
      color: #a0a0a0;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .tips li::before {
      content: '•';
      color: #00FF88;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">💪</div>
    <h1>Sin Conexión</h1>
    <p>
      No tienes conexión a internet. BIOMOV necesita conexión para sincronizar tus datos de entrenamiento.
    </p>
    
    <div class="icon">📡</div>
    
    <button class="retry-btn" onclick="window.location.reload()">
      Reintentar Conexión
    </button>
    
    <div class="tips">
      <h3>Mientras tanto...</h3>
      <ul>
        <li>Revisa tu conexión WiFi o datos móviles</li>
        <li>Tus entrenamientos se sincronizarán automáticamente</li>
        <li>Puedes planificar tu próxima sesión mentalmente</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
